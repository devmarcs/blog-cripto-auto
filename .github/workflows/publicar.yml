name: Publicar Post Diario

on:
  schedule:
    - cron: '0 11 * * *'  # 08h horario de Brasilia (UTC-3)
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar arquivos sensíveis
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' | base64 -d > credentials.json
          echo '${{ secrets.TOKEN_JSON }}' | base64 -d > token.json
          printf 'OPENAI_API_KEY=%s\nBLOGGER_BLOG_ID=%s\n' \
            '${{ secrets.OPENAI_API_KEY }}' \
            '${{ secrets.BLOGGER_BLOG_ID }}' > .env

      - name: Publicar post
        run: python main.py
